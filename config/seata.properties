# Seata 配置（导入到 Nacos 配置中心）
# Data ID: seata.properties
# Group: SEATA_GROUP

# 事务分组映射
service.vgroupMapping.user-service-tx-group=default
service.vgroupMapping.seat-service-tx-group=default
service.vgroupMapping.reservation-service-tx-group=default

# 存储模式（file 模式，简单起见）
store.mode=file
store.file.dir=file_store/data
store.file.maxBranchSessionSize=16384
store.file.maxGlobalSessionSize=512
store.file.fileWriteBufferCacheSize=16384
store.file.flushDiskMode=async
store.file.sessionReloadReadSize=100
